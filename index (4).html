<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Hunter 🎨 by Yuna</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --accent: #ec4899;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; }
        
        body { 
            background: var(--bg-color); 
            background-image: radial-gradient(circle at 50% 0%, #312e81 0%, #0f172a 100%);
            color: var(--text-main); 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* --- Top Bar --- */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; margin: 20px;
        }
        .score { font-size: 28px; color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }

        /* --- Main Area --- */
        .game-area {
            display: flex; flex: 1; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }

        .task-title {
            font-size: 42px; text-align: center;
            padding: 15px 40px; border-radius: 20px;
            transition: all 0.3s ease;
        }

        /* --- Camera & Scanner --- */
        .camera-container {
            position: relative; width: 400px; height: 400px;
            border-radius: 30px; overflow: hidden;
            border: 4px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #hidden_canvas { display: none; }

        /* Scanner Box */
        .scanner-box {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            border: 4px dashed rgba(255,255,255,0.8);
            border-radius: 20px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }

        /* Progress Indicator */
        .progress-circle {
            position: absolute;
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 8px solid transparent;
            border-top-color: var(--accent);
            opacity: 0; transition: opacity 0.2s;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .correct-anim {
            animation: successPulse 0.6s ease-out;
        }
        @keyframes successPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 30px rgba(16, 185, 129, 0); border-color: #10b981; }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .debug-color { margin-top: 10px; font-size: 16px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="glass-panel top-bar">
        <h2>Color Hunter 🚀</h2>
        <div class="score">XP: <span id="score-val">0</span> ⚡</div>
    </div>

    <div class="game-area">
        <div id="task-card" class="glass-panel task-title" style="background: rgba(255,255,255,0.1);">
            Show me: <span id="target-color-name">Loading...</span>
        </div>

        <div class="camera-container" id="cam-container">
            <video id="webcam" autoplay playsinline></video>
            <div class="scanner-box"></div>
            <div class="progress-circle" id="progress"></div>
        </div>

        <div class="debug-color" id="debug-info">Waiting for camera...</div>
    </div>

    <canvas id="hidden_canvas"></canvas>

    <script>
        // Color database (H - Hue from 0 to 360)
        const targetColors = [
            { id: 'red', name: 'Red 🔴', bg: '#ef4444', minH: 340, maxH: 15 },
            { id: 'yellow', name: 'Yellow 🟡', bg: '#eab308', minH: 40, maxH: 65 },
            { id: 'green', name: 'Green 🟢', bg: '#22c55e', minH: 90, maxH: 150 },
            { id: 'blue', name: 'Blue 🔵', bg: '#3b82f6', minH: 190, maxH: 260 }
        ];

        let currentTarget = null;
        let score = 0;
        let scanProgress = 0; 
        let isProcessing = false;

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('hidden_canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const progressIndicator = document.getElementById('progress');
        const camContainer = document.getElementById('cam-container');
        const debugInfo = document.getElementById('debug-info');

        // Camera Initialization
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    nextLevel();
                    requestAnimationFrame(scanLoop);
                };
            })
            .catch(err => alert("Camera access error: " + err));

        function nextLevel() {
            const randomIndex = Math.floor(Math.random() * targetColors.length);
            currentTarget = targetColors[randomIndex];
            
            const taskCard = document.getElementById('task-card');
            document.getElementById('target-color-name').innerText = currentTarget.name;
            taskCard.style.boxShadow = `0 0 20px ${currentTarget.bg}40`;
            progressIndicator.style.borderTopColor = currentTarget.bg;
            
            scanProgress = 0;
            isProcessing = false;
        }

        function scanLoop() {
            if (!isProcessing && currentTarget) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const boxSize = 80; 
                const startX = (canvas.width - boxSize) / 2;
                const startY = (canvas.height - boxSize) / 2;

                const imageData = ctx.getImageData(startX, startY, boxSize, boxSize);
                const data = imageData.data;

                let r = 0, g = 0, b = 0;
                let count = 0;

                for (let i = 0; i < data.length; i += 16) {
                    r += data[i];
                    g += data[i + 1];
                    b += data[i + 2];
                    count++;
                }

                r = Math.round(r / count);
                g = Math.round(g / count);
                b = Math.round(b / count);

                const hsl = rgbToHsl(r, g, b);
                const h = hsl[0]; 
                const s = hsl[1]; 
                const l = hsl[2]; 

                debugInfo.innerText = `H: ${h} | S: ${s}% | L: ${l}%`;

                let isMatch = false;

                if (s > 25 && l > 20 && l < 85) {
                    if (currentTarget.minH > currentTarget.maxH) {
                        isMatch = (h >= currentTarget.minH || h <= currentTarget.maxH);
                    } else {
                        isMatch = (h >= currentTarget.minH && h <= currentTarget.maxH);
                    }
                }

                if (isMatch) {
                    scanProgress += 5; 
                    progressIndicator.style.opacity = 1;
                } else {
                    scanProgress -= 2; 
                    if (scanProgress <= 0) {
                        scanProgress = 0;
                        progressIndicator.style.opacity = 0;
                    }
                }

                if (scanProgress >= 100) {
                    handleSuccess();
                }
            }

            requestAnimationFrame(scanLoop);
        }

        function handleSuccess() {
            isProcessing = true;
            progressIndicator.style.opacity = 0;
            
            score += 50;
            document.getElementById('score-val').innerText = score;

            camContainer.classList.add('correct-anim');
            playTone(600, 0.1, 'sine');
            setTimeout(() => playTone(900, 0.2, 'sine'), 100);

            setTimeout(() => {
                camContainer.classList.remove('correct-anim');
                nextLevel();
            }, 1000);
        }

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            let max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0; 
            } else {
                let d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
        }

        function playTone(freq, duration, type) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
    </script>
</body>
</html>
